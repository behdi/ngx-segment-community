name: Bump, Release and Publish

on:
  workflow_dispatch:
    inputs:
      version_type:
        description:
          "The type of version bump (major, minor, patch, prepatch, etc)"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
          - prepatch
          - preminor
          - premajor
          - prerelease

permissions:
  contents: write

jobs:
  release:
    name: Build, Publish, and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_PAT }}
          fetch-depth: 0

      - name: Setup Node.js & Cache
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install Dependencies
        run: npm ci

      - name: Bump Version across Workspaces
        id: get_version
        run: |
          npm version ${{ github.event.inputs.version_type }} --preid=rc --workspaces --include-workspace-root --workspaces-update=false --no-git-tag-version

          # Extract the new version from the root package.json
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Commit and push bumped version
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          tagging_message: "v${{ steps.get_version.outputs.version }}"
          commit_message:
            "chore(release): version update v${{
            steps.get_version.outputs.version }} [skip ci]"

      - name: Build Library
        run: npm run build --workspaces

      - name: Publish to NPM
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PUBLISH_TAG:
            ${{ startsWith(github.event.inputs.version_type, 'pre') && 'next' ||
            'latest' }}
        run: |
          echo "Publishing ngx-segment-community with tag: $PUBLISH_TAG"
          cd dist/ngx-segment-community
          npm publish --tag $PUBLISH_TAG

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: v${{ steps.get_version.outputs.version }}
          generate_release_notes: true
          prerelease: ${{ startsWith(github.event.inputs.version_type, 'pre') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
